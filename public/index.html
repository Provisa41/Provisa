<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Pro Visa</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>Pro Visa</h1>
        <p id="user-greeting" class="muted">Загрузка…</p>
      </header>

      <nav class="tabs" role="tablist">
        <button type="button" class="tab active" data-tab="countries">Страны</button>
        <button type="button" class="tab" data-tab="documents">Проверка</button>
        <button type="button" class="tab" data-tab="updates">Новости</button>
        <button type="button" class="tab" data-tab="consult">Консультация</button>
      </nav>

      <main>
        <section id="panel-countries" class="panel active">
          <label for="country-select">Страна назначения</label>
          <select id="country-select">
            <option value="">Загрузка…</option>
          </select>
          <div id="country-detail" class="country-detail muted">
            Выберите страну, чтобы увидеть список документов.
          </div>
        </section>

        <section id="panel-documents" class="panel">
          <p class="muted">
            Загрузите скан — демо-оценка готовности. Чек-лист по стране — вкладка «Страны».
          </p>
          <label class="file-label">
            <input type="file" id="file-input" accept=".pdf,.jpg,.jpeg,.png" />
            <span>Выбрать документ</span>
          </label>
          <button type="button" id="check-btn" class="btn primary" disabled>
            Проверить
          </button>
          <div id="result" class="result hidden"></div>
        </section>

        <section id="panel-updates" class="panel">
          <label for="news-filter">Фильтр по стране</label>
          <select id="news-filter">
            <option value="">Все страны</option>
          </select>
          <div id="news-list" class="news-list muted">Загрузка новостей…</div>
        </section>

        <section id="panel-consult" class="panel">
          <label for="consult-phone">Телефон (необязательно)</label>
          <input
            type="tel"
            id="consult-phone"
            placeholder="+7 900 000-00-00"
            autocomplete="tel"
          />
          <label for="consult-topic">Тема консультации</label>
          <textarea
            id="consult-topic"
            rows="4"
            placeholder="Страна, тип визы, сроки…"
          ></textarea>
          <button type="button" id="consult-btn" class="btn primary">
            Отправить заявку
          </button>
          <p id="consult-status" class="muted"></p>
        </section>
      </main>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
